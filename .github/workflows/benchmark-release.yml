name: Benchmark Release

on:
  workflow_dispatch:
    inputs:
      unilink_ref:
        description: "unilink tag or commit to benchmark"
        required: true
        default: "v0.7.5"
      runner_labels:
        description: "JSON array of self-hosted runner labels"
        required: true
        default: '["self-hosted","Linux","X64"]'
      platform_suffix:
        description: "Suffix used in artifact names, for example linux-arm64-jetson-orin-nano-super"
        required: true
        default: "linux-x64-self-hosted"
      release_suffix:
        description: "Optional suffix used in release tag names, for example jetson-orin-nano-super"
        required: false
        default: ""
      reference_platform:
        description: "Human-readable reference platform name"
        required: false
        default: ""
      publish_release:
        description: "Upload release assets when unilink_ref looks like a release tag"
        required: true
        type: boolean
        default: true
      payload_sizes:
        description: "Space-separated payload sizes"
        required: true
        default: "64 256 1024 4096 16384 65536"
      repeats:
        description: "Repeats per payload"
        required: true
        default: "3"
      iterations:
        description: "Latency iterations per run"
        required: true
        default: "10000"
      warmup_iterations:
        description: "Latency warmup iterations per run"
        required: true
        default: "1000"
      udp_max_payload_size:
        description: "Maximum UDP latency payload size; use 0 to disable the cap"
        required: true
        default: "1024"
      strategy_duration:
        description: "Strategy benchmark duration in seconds"
        required: true
        default: "3"
      udp_payload_smoke_sizes:
        description: "Space-separated UDP payload smoke sizes"
        required: true
        default: "1024 4096 16384"
      udp_payload_smoke_iterations:
        description: "UDP payload smoke iterations"
        required: true
        default: "1000"
      udp_payload_smoke_warmup_iterations:
        description: "UDP payload smoke warmup iterations"
        required: true
        default: "100"
      udp_payload_smoke_timeout_ms:
        description: "UDP payload smoke timeout in milliseconds"
        required: true
        default: "1000"

permissions:
  contents: write

jobs:
  benchmark:
    name: Benchmark unilink ${{ inputs.unilink_ref }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 120

    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DUNILINK_BENCH_USE_FETCHCONTENT=ON
          -DUNILINK_BENCH_UNILINK_GIT_TAG="${{ inputs.unilink_ref }}"
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run benchmark sweeps
        env:
          PAYLOAD_SIZES: ${{ inputs.payload_sizes }}
          REPEATS: ${{ inputs.repeats }}
          ITERATIONS: ${{ inputs.iterations }}
          WARMUP_ITERATIONS: ${{ inputs.warmup_iterations }}
          UDP_MAX_PAYLOAD_SIZE: ${{ inputs.udp_max_payload_size }}
          DURATION: ${{ inputs.strategy_duration }}
          UDP_PAYLOAD_SMOKE_SIZES: ${{ inputs.udp_payload_smoke_sizes }}
          UDP_PAYLOAD_SMOKE_ITERATIONS: ${{ inputs.udp_payload_smoke_iterations }}
          UDP_PAYLOAD_SMOKE_WARMUP_ITERATIONS: ${{ inputs.udp_payload_smoke_warmup_iterations }}
          UDP_PAYLOAD_SMOKE_TIMEOUT_MS: ${{ inputs.udp_payload_smoke_timeout_ms }}
        run: |
          set -euo pipefail
          result_dir="build/release-results"
          mkdir -p "${result_dir}"

          python3 scripts/collect_environment.py "${result_dir}"

          OUTPUT="${result_dir}/latency_matrix.csv" \
          SUMMARY="${result_dir}/latency_matrix_summary.md" \
          ./scripts/run_latency_matrix.sh

          OUTPUT="${result_dir}/strategy_sweep.csv" \
          SUMMARY="${result_dir}/strategy_sweep_summary.md" \
          ./scripts/run_strategy_sweep.sh

          OUTPUT="${result_dir}/raw_udp_payload_smoke.csv" \
          SUMMARY="${result_dir}/raw_udp_payload_smoke_summary.md" \
          PAYLOAD_SIZES="${UDP_PAYLOAD_SMOKE_SIZES}" \
          ITERATIONS="${UDP_PAYLOAD_SMOKE_ITERATIONS}" \
          WARMUP_ITERATIONS="${UDP_PAYLOAD_SMOKE_WARMUP_ITERATIONS}" \
          TIMEOUT_MS="${UDP_PAYLOAD_SMOKE_TIMEOUT_MS}" \
          ./scripts/run_raw_udp_payload_smoke.sh

          OUTPUT="${result_dir}/udp_payload_smoke.csv" \
          SUMMARY="${result_dir}/udp_payload_smoke_summary.md" \
          PAYLOAD_SIZES="${UDP_PAYLOAD_SMOKE_SIZES}" \
          ITERATIONS="${UDP_PAYLOAD_SMOKE_ITERATIONS}" \
          WARMUP_ITERATIONS="${UDP_PAYLOAD_SMOKE_WARMUP_ITERATIONS}" \
          TIMEOUT_MS="${UDP_PAYLOAD_SMOKE_TIMEOUT_MS}" \
          ./scripts/run_udp_payload_smoke.sh

      - name: Generate release notes
        run: >
          python3 scripts/generate_release_notes.py
          --result-dir build/release-results
          --unilink-ref "${{ inputs.unilink_ref }}"
          --platform-suffix "${{ inputs.platform_suffix }}"
          --reference-platform "${{ inputs.reference_platform }}"
          --output build/release-results/release_notes.md

      - name: Package benchmark result
        id: package
        run: >
          python3 scripts/package_results.py
          --result-dir build/release-results
          --output-dir build/package
          --unilink-ref "${{ inputs.unilink_ref }}"
          --platform-suffix "${{ inputs.platform_suffix }}"
          --reference-platform "${{ inputs.reference_platform }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset_base }}
          path: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error

      - name: Upload release assets
        if: ${{ inputs.publish_release && startsWith(inputs.unilink_ref, 'v') }}
        env:
          GH_TOKEN: ${{ github.token }}
          UNILINK_REF: ${{ inputs.unilink_ref }}
          RELEASE_SUFFIX: ${{ inputs.release_suffix }}
          REFERENCE_PLATFORM: ${{ inputs.reference_platform }}
          TARBALL: ${{ steps.package.outputs.tarball }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
          NOTES_FILE: build/release-results/release_notes.md
        run: |
          set -euo pipefail
          command -v gh >/dev/null
          release_suffix="$(printf '%s' "${RELEASE_SUFFIX}" | sed 's/[^A-Za-z0-9._-]/-/g')"
          release_tag="benchmark-unilink-${UNILINK_REF}"
          if [[ -n "${release_suffix}" ]]; then
            release_tag="${release_tag}-${release_suffix}"
          fi
          release_title="Benchmark results for unilink ${UNILINK_REF}"
          if [[ -n "${REFERENCE_PLATFORM}" ]]; then
            release_title="${release_title} on ${REFERENCE_PLATFORM}"
          elif [[ -n "${release_suffix}" ]]; then
            release_title="${release_title} on ${release_suffix}"
          fi

          if ! gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release create "${release_tag}" \
              --title "${release_title}" \
              --notes-file "${NOTES_FILE}"
          else
            gh release edit "${release_tag}" \
              --title "${release_title}" \
              --notes-file "${NOTES_FILE}"
          fi

          gh release upload "${release_tag}" "${TARBALL}" "${CHECKSUM}" --clobber
